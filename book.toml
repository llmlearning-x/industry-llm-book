[book]
title = "行业大模型应用实践：从技术架构到落地方法论"
authors = ["llmlearning-x"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
git-repository-url = "https://github.com/llmlearning-x/industry-llm-book"
edit-url-template = "https://github.com/llmlearning-x/industry-llm-book/edit/main/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
